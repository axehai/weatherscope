reviews:
  profile: assertive
  request_changes_workflow: true

  path_instructions:
    - path: "**/*.kt"
      instructions: |
        The purpose of these reviews is to enforce clean architecture boundaries,
        separation of concerns, correctness, and maintainability for this Android
        project.

        Review philosophy:
        - Prioritize correctness, architecture, and testability over style nits.
        - Do not nitpick formatting or naming unless it materially harms readability
          or maintainability.
        - Only raise blocking feedback for clear violations, bugs, or meaningful design risks.
        - Prefer practical Android guidance over theoretical purity.

        ============================================================
        PROJECT LAYER STRUCTURE & DEPENDENCY DIRECTION
        ============================================================
        Typical modules/directories:
        presentation/
        domain/
        data/
        di/
        common/

        Expected dependency direction:
        - Presentation depends on Domain.
        - Data depends on Domain.
        - Domain depends on nothing from Presentation, Data, or Android framework code.

        Flag:
        - Domain depending on Data or Presentation.
        - Presentation bypassing Domain to access Data directly.
        - Cross-layer imports that weaken boundaries.

        ============================================================
        DOMAIN LAYER
        ============================================================
        Domain contains core business logic.

        Expected responsibilities:
        - Entities / domain models
        - Repository interfaces
        - Use cases
        - Pure business rules

        Rules:
        - Must not depend on Android framework classes.
        - Must not depend on networking / persistence implementation libraries
          (e.g. Retrofit, Room, Gson/Moshi DTOs, etc.).
        - Must not import classes from presentation or data layers.
        - Use cases should be focused, readable, and named by intent.

        Flag:
        - DTOs or framework models leaking into domain.
        - Repository implementations placed in domain.
        - Business logic tightly coupled to implementation details.

        ============================================================
        DATA LAYER
        ============================================================
        Data implements domain contracts and handles external sources.

        Allowed responsibilities:
        - API clients
        - Database access
        - DTOs / local entities
        - Mappers between external models and domain models
        - Repository implementations

        Flag:
        - Business rules or orchestration that belong in use cases.
        - Returning DTOs/entities directly to presentation when domain mapping is expected.
        - Leaking persistence/network concerns upward.

        ============================================================
        PRESENTATION LAYER
        ============================================================
        Presentation contains UI, ViewModels, UI models/state, and event handling.

        Rules:
        - UI should primarily render state and send user events upward.
        - ViewModels should coordinate use cases and expose state via StateFlow / Flow.
        - Avoid direct repository access from UI or ViewModels when a use case layer exists.
        - Avoid exposing mutable state directly to the UI.
        - Prefer passing state and event lambdas down the Compose tree instead of passing ViewModels broadly.

        Guidance for Compose:
        - Flag business logic inside composables when it is non-trivial or hard to test.
        - Flag repeated expensive work or unnecessary object allocation inside composables
          when it is likely to cause avoidable recomposition cost.
        - Prefer `remember`, `derivedStateOf`, or moving work outside composables when useful,
          but do not nitpick harmless allocations.
        - Small UI-only calculations and lightweight formatting are acceptable when they
          do not meaningfully hurt readability or performance.

        Guidance for ViewModels:
        - ViewModels may use normal AndroidX ViewModel responsibilities.
        - Avoid unnecessary Android framework dependencies such as Context, Views, or Compose UI APIs,
          unless there is a justified platform integration point.

        Flag:
        - Business logic inside screens or composables.
        - Direct repository access from composables or ViewModels.
        - Mutable state exposed as public mutable types.
        - UI code that becomes hard to test due to mixed concerns.

        ============================================================
        DEPENDENCY INJECTION (Hilt)
        ============================================================
        The `di` layer wires dependencies.

        Rules:
        - No business logic in DI modules.
        - Prefer constructor injection by default.
        - Use provider methods only when needed for third-party or framework types.

        Flag:
        - Complex logic hidden inside DI modules.
        - Manual dependency construction where DI should own it.
        - Unnecessary singleton scope or incorrect scoping that can cause bugs.

        ============================================================
        TESTABILITY
        ============================================================
        Code should remain testable by design.

        Rules:
        - New or meaningfully changed business logic should usually have unit test coverage.
        - Inject coroutine dispatchers instead of hardcoding Dispatchers.IO/Main in testable code.
        - Prefer designs that allow mocking/faking dependencies cleanly.

        Do NOT block solely because:
        - A trivial pass-through use case has no dedicated test yet.
        - A PR is only changing UI layout/text with no logic risk.
        - A change is wiring-only and does not introduce behavior.

        Flag:
        - New non-trivial use case logic without test coverage.
        - Hardcoded dependencies that make testing difficult.
        - Coroutine code tightly coupled to real dispatchers.

        ============================================================
        REVIEW PRIORITY
        ============================================================
        Prioritize feedback in this order:
        1. Architecture and boundary violations
        2. Correctness / bug risks / concurrency issues
        3. Missing tests for meaningful business logic
        4. State management and maintainability
        5. Naming/readability improvements

    - path: "**/*.kts"
      instructions: |
        Review Gradle Kotlin DSL files for correctness, maintainability, and dependency hygiene.

        Focus on:
        - Correct plugin and dependency usage
        - Avoiding duplicated or conflicting dependency declarations
        - Sensible version management
        - Clear module boundaries and build setup

        Flag:
        - Unused dependencies or plugins
        - Suspicious version mismatches
        - Build logic that should be centralized but is duplicated excessively

        Avoid nitpicking formatting unless it affects readability.

    - path: ".github/workflows/*.yml"
      instructions: |
        Review CI workflows for correctness, reliability, and efficiency.

        Focus on:
        - Broken or incomplete job dependencies
        - Missing caching where clearly beneficial
        - Risky secrets usage
        - Needlessly slow or duplicated steps

        Prefer practical suggestions. Avoid overengineering.

    - path: "**/*.md"
      instructions: |
        Review docs for clarity, accuracy, and consistency with the codebase.

        Focus on:
        - Incorrect setup steps
        - Missing prerequisites
        - Mismatch between README/docs and actual project behavior

        Avoid style-only nitpicks unless the writing is confusing.